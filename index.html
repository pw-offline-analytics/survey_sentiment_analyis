<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0f1115;
  --bg-soft:#151822;
  --panel:#181c27;
  --panel-2:#1e2330;
  --line:#2a3040;
  --line-soft:#20242f;
  --ink:#eef0f4;
  --ink-dim:#9aa2b4;
  --ink-faint:#64697a;
  --amber:#f0a63a;
  --amber-soft:#3a2c17;
  --teal:#48c9b0;
  --teal-soft:#123531;
  --coral:#e8615a;
  --coral-soft:#3a1c1e;
  --indigo:#7c8cf8;
  --indigo-soft:#1f2244;
  --radius:14px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:'Inter',sans-serif;
  -webkit-font-smoothing:antialiased;
}
.mono{font-family:'JetBrains Mono',monospace;}

/* ---------- top header ---------- */
.topbar{
  position:sticky; top:0; z-index:50;
  background:linear-gradient(180deg, rgba(15,17,21,0.97), rgba(15,17,21,0.9));
  border-bottom:1px solid var(--line-soft);
  backdrop-filter:blur(6px);
}
.topbar-inner{
  max-width:1280px; margin:0 auto; padding:18px 28px 0 28px;
}
.brand-row{display:flex; align-items:center; justify-content:space-between; gap:20px; flex-wrap:wrap;}
.brand{display:flex; align-items:center; gap:12px;}
.brand-mark{
  width:38px; height:38px; border-radius:10px;
  background:linear-gradient(135deg, var(--indigo), var(--teal));
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
.brand-mark svg{width:20px; height:20px;}
.brand-text h1{font-family:'Sora',sans-serif; font-size:16.5px; font-weight:700; margin:0; letter-spacing:0.2px;}
.brand-text p{margin:1px 0 0 0; font-size:12px; color:var(--ink-dim);}
.pulse-wrap{display:flex; align-items:center; gap:8px; color:var(--ink-faint); font-size:11.5px;}
.pulse-dot{width:7px; height:7px; border-radius:50%; background:var(--teal); box-shadow:0 0 0 0 rgba(72,201,176,0.6); animation:pulse 2s infinite;}
@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(72,201,176,0.55);}
  70%{box-shadow:0 0 0 7px rgba(72,201,176,0);}
  100%{box-shadow:0 0 0 0 rgba(72,201,176,0);}
}
.tabs{
  display:flex; gap:2px; margin-top:16px; overflow-x:auto; scrollbar-width:none;
  border-bottom:1px solid var(--line-soft);
}
.tabs::-webkit-scrollbar{display:none;}
.tab-btn{
  font-family:'Inter',sans-serif; font-size:13.2px; font-weight:600;
  color:var(--ink-faint); background:transparent; border:none;
  padding:11px 16px 13px 16px; cursor:pointer; white-space:nowrap;
  border-bottom:2px solid transparent; transition:color .15s, border-color .15s;
}
.tab-btn:hover{color:var(--ink-dim);}
.tab-btn.active{color:var(--ink); border-bottom-color:var(--amber);}

/* ---------- layout ---------- */
.wrap{max-width:1280px; margin:0 auto; padding:26px 28px 70px 28px;}
.panel{display:none;}
.panel.active{display:block; animation:fade .35s ease;}
@keyframes fade{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);}}

.section-head{margin:34px 0 16px 0;}
.section-head:first-child{margin-top:0;}
.section-head h2{font-family:'Sora',sans-serif; font-size:17px; font-weight:700; margin:0 0 4px 0;}
.section-head p{margin:0; font-size:13px; color:var(--ink-dim); max-width:720px; line-height:1.5;}
.eyebrow{
  font-size:11px; font-weight:700; letter-spacing:1.2px; text-transform:uppercase;
  color:var(--amber); margin:0 0 6px 0;
}

/* ---------- grid & cards ---------- */
.grid{display:grid; gap:14px;}
.g4{grid-template-columns:repeat(4,1fr);}
.g3{grid-template-columns:repeat(3,1fr);}
.g2{grid-template-columns:repeat(2,1fr);}
@media (max-width:980px){.g4{grid-template-columns:repeat(2,1fr);} .g3{grid-template-columns:repeat(2,1fr);} .g2{grid-template-columns:1fr;}}
@media (max-width:620px){.g4{grid-template-columns:1fr;} .g3{grid-template-columns:1fr;}}

.card{
  background:var(--panel);
  border:1px solid var(--line-soft);
  border-radius:var(--radius);
  padding:18px 18px;
}
.card h3{font-family:'Sora',sans-serif; font-size:13.5px; font-weight:700; margin:0 0 3px 0;}
.card .sub{font-size:11.5px; color:var(--ink-faint); margin:0 0 14px 0;}

.kpi{
  background:var(--panel);
  border:1px solid var(--line-soft);
  border-radius:var(--radius);
  padding:18px 18px 16px 18px;
  position:relative;
  overflow:hidden;
}
.kpi .tag{font-size:10.5px; font-weight:700; letter-spacing:0.8px; text-transform:uppercase; color:var(--ink-faint); margin-bottom:10px; display:block;}
.kpi .num{font-family:'Sora',sans-serif; font-size:30px; font-weight:800; line-height:1;}
.kpi .num span{font-size:15px; font-weight:600; color:var(--ink-dim);}
.kpi .cap{margin-top:8px; font-size:12px; color:var(--ink-dim); line-height:1.45;}
.kpi.accent-amber{border-color:rgba(240,166,58,0.35);}
.kpi.accent-teal{border-color:rgba(72,201,176,0.35);}
.kpi.accent-coral{border-color:rgba(232,97,90,0.35);}
.kpi.accent-indigo{border-color:rgba(124,140,248,0.35);}
.kpi .num.amber{color:var(--amber);}
.kpi .num.teal{color:var(--teal);}
.kpi .num.coral{color:var(--coral);}
.kpi .num.indigo{color:var(--indigo);}

.chart-box{position:relative; height:260px;}
.chart-box.tall{height:320px;}
.chart-box.short{height:210px;}

/* ---------- insight callouts ---------- */
.insight{
  display:flex; gap:12px; align-items:flex-start;
  background:var(--panel-2);
  border:1px solid var(--line-soft);
  border-left:3px solid var(--amber);
  border-radius:10px;
  padding:13px 15px;
  margin-bottom:10px;
  font-size:13px; line-height:1.55; color:var(--ink);
}
.insight b{color:var(--amber); font-weight:700;}
.insight.teal{border-left-color:var(--teal);}
.insight.teal b{color:var(--teal);}
.insight.coral{border-left-color:var(--coral);}
.insight.coral b{color:var(--coral);}
.insight-num{
  font-family:'Sora',sans-serif; font-weight:800; font-size:16px; color:var(--amber);
  flex-shrink:0; width:26px;
}

/* ---------- quotes ---------- */
.quote-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:12px;}
@media (max-width:900px){.quote-grid{grid-template-columns:repeat(2,1fr);}}
@media (max-width:620px){.quote-grid{grid-template-columns:1fr;}}
.quote-card{
  background:var(--panel-2); border:1px solid var(--line-soft); border-radius:12px;
  padding:14px 15px; font-size:12.8px; line-height:1.55; color:var(--ink-dim);
  position:relative;
}
.quote-card::before{content:"\201C"; font-family:'Sora',serif; font-size:26px; color:var(--ink-faint); position:absolute; top:6px; left:10px; opacity:0.5;}
.quote-card span{display:block; padding-left:16px;}
.quote-card.positive{border-left:3px solid var(--teal);}
.quote-card.negative{border-left:3px solid var(--coral);}

/* ---------- tables ---------- */
table{width:100%; border-collapse:collapse; font-size:12.5px;}
th{text-align:left; color:var(--ink-faint); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:0.4px; padding:8px 10px; border-bottom:1px solid var(--line-soft);}
td{padding:8px 10px; border-bottom:1px solid var(--line-soft); color:var(--ink-dim);}
tr:last-child td{border-bottom:none;}
td.strong{color:var(--ink); font-weight:600;}
.bar-cell{display:flex; align-items:center; gap:8px;}
.bar-track{flex:1; height:6px; background:var(--line-soft); border-radius:4px; overflow:hidden;}
.bar-fill{height:100%; border-radius:4px; background:var(--amber);}

/* ---------- badges ---------- */
.badge{display:inline-block; font-size:10.5px; font-weight:700; padding:3px 8px; border-radius:20px; letter-spacing:0.3px;}
.badge.high{background:var(--coral-soft); color:var(--coral);}
.badge.med{background:var(--amber-soft); color:var(--amber);}
.badge.low{background:var(--teal-soft); color:var(--teal);}

/* ---------- funnel ---------- */
.funnel-row{display:flex; align-items:center; gap:14px; margin-bottom:10px;}
.funnel-label{width:170px; font-size:12px; color:var(--ink-dim); flex-shrink:0;}
.funnel-bar-track{flex:1; height:26px; background:var(--line-soft); border-radius:6px; overflow:hidden; position:relative;}
.funnel-bar-fill{height:100%; border-radius:6px; display:flex; align-items:center; justify-content:flex-end; padding-right:8px;}
.funnel-bar-fill span{font-size:11.5px; font-weight:700; color:#10131a;}

/* ---------- methodology ---------- */
.notelist{margin:0; padding-left:0; list-style:none;}
.notelist li{
  padding:12px 0; border-bottom:1px solid var(--line-soft); font-size:13px; color:var(--ink-dim); line-height:1.6;
  display:flex; gap:10px;
}
.notelist li:last-child{border-bottom:none;}
.notelist li::before{content:"—"; color:var(--ink-faint); flex-shrink:0;}
.notelist b{color:var(--ink);}

.footer-note{
  margin-top:40px; padding-top:18px; border-top:1px solid var(--line-soft);
  font-size:11.5px; color:var(--ink-faint); display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px;
}
</style>
</head>

const DATA = JSON.parse(document.getElementById('dashboard-data').textContent);

Chart.defaults.font.family = "'Inter', sans-serif";
Chart.defaults.color = '#9aa2b4';
Chart.defaults.font.size = 11.5;

const COLORS = {
  amber:'#f0a63a', teal:'#48c9b0', coral:'#e8615a', indigo:'#7c8cf8',
  slate:'#4a5468', lilac:'#b083f0', sky:'#5aa9e6', line:'#2a3040'
};
const PALETTE = ['#f0a63a','#48c9b0','#7c8cf8','#e8615a','#b083f0','#5aa9e6','#4a5468','#d4c05a','#6fbf8e','#e08f9b'];

function fmt(n){ return n.toLocaleString('en-IN'); }
function pct(n,total){ return total ? ((n/total)*100).toFixed(1)+'%' : '0%'; }

function baseGridOpts(){
  return {
    scales:{
      x:{grid:{color:COLORS.line, drawBorder:false}, ticks:{color:'#9aa2b4'}},
      y:{grid:{color:COLORS.line, drawBorder:false}, ticks:{color:'#9aa2b4'}, beginAtZero:true}
    },
    plugins:{legend:{display:false}},
    maintainAspectRatio:false, responsive:true
  };
}

function hbar(ctx, labels, values, color){
  return new Chart(ctx, {
    type:'bar',
    data:{labels, datasets:[{data:values, backgroundColor:color||COLORS.amber, borderRadius:5, barThickness:16}]},
    options:{
      indexAxis:'y',
      maintainAspectRatio:false, responsive:true,
      scales:{
        x:{grid:{color:COLORS.line, drawBorder:false}, ticks:{color:'#9aa2b4'}, beginAtZero:true},
        y:{grid:{display:false}, ticks:{color:'#c3c8d4', font:{size:11.5}}}
      },
      plugins:{legend:{display:false}, tooltip:{backgroundColor:'#1e2330', titleColor:'#eef0f4', bodyColor:'#c3c8d4', borderColor:'#2a3040', borderWidth:1}}
    }
  });
}

function donut(ctx, labels, values){
  return new Chart(ctx, {
    type:'doughnut',
    data:{labels, datasets:[{data:values, backgroundColor:PALETTE, borderColor:'#181c27', borderWidth:2}]},
    options:{
      cutout:'62%', maintainAspectRatio:false, responsive:true,
      plugins:{
        legend:{position:'right', labels:{boxWidth:10, boxHeight:10, padding:10, color:'#9aa2b4', font:{size:11}}},
        tooltip:{backgroundColor:'#1e2330', titleColor:'#eef0f4', bodyColor:'#c3c8d4', borderColor:'#2a3040', borderWidth:1}
      }
    }
  });
}

function vbar(ctx, labels, datasets){
  return new Chart(ctx, {
    type:'bar',
    data:{labels, datasets},
    options:{
      maintainAspectRatio:false, responsive:true,
      scales:{
        x:{stacked:true, grid:{display:false}, ticks:{color:'#9aa2b4', font:{size:10.5}, maxRotation:38, minRotation:0}},
        y:{stacked:true, grid:{color:COLORS.line, drawBorder:false}, ticks:{color:'#9aa2b4'}, beginAtZero:true}

        <li>Free-text fields (verbatim, improvement suggestions, safer-choice reasons) were classified using a <b>keyword-matching heuristic</b> — not a trained NLP/LLM sentiment model — to keep the method transparent and auditable in a spreadsheet if needed.</li>
        <li>This is well-suited to spotting <b>recurring themes and rough tone</b> at this sample size, but it will miss sarcasm, mixed sentiment in one sentence, and nuance a human reviewer would catch. Treat the theme/sentiment split as directional, not a precise score.</li>
        <li>Categorical fields (Main Non-Conversion Reason, Derived Loss Type, Priority Tag, etc.) are the more reliable signal in this report, since those were coded directly by the human telecaller during the live conversation.</li>
      </ul>
    </div>

    <div class="card" style="margin-top:14px;">
      <h3>Sampling &amp; bias caveats</h3>
      <ul class="notelist">
        <li><b>Response/self-selection bias:</b> only ~22% of the target audience produced a full response. Families willing to stay on the phone or fill a form may be systematically less frustrated (or more, if they wanted to vent) than the ~78% who didn't respond — treat percentages as describing "respondents," not the full non-converted population.</li>
        <li><b>Free-text coding is manual:</b> "Other" and "Other / Needs Review" buckets (in Main Reason and Derived Loss Type) are sizeable — worth a follow-up pass to re-code those into the named categories for a cleaner picture.</li>
        <li><b>Two surveys, not one:</b> the calling data and feedback form were designed and run somewhat independently; this dashboard reports them side by side rather than merging them into a single number, to avoid double-counting or false precision.</li>
      </ul>
    </div>
